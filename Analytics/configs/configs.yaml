# =========================================================
# プロジェクト設定
# =========================================================
project:
  name: 'プロジェクト名'          # 例: BA01-XXX-XX_分析名
  id: 'BAXX-XXX-XX'
  description: '分析の概要・目的'
  analyst: ''

# =========================================================
# パス設定
# =========================================================
paths:
  # 作業ベースディレクトリ（このファイルからの相対パス or 絶対パス）
  base: '..'
  data: '../data'
  processed_data: '../processed_data'
  results: '../results'
  figures: '../results/figures'
  tables: '../results/tables'
  memo: '../memo'

# =========================================================
# 分析期間
# =========================================================
period:
  start: 'YYYYMM'        # データ開始年月
  end: 'YYYYMM'          # データ終了年月
  train_end: 'YYYYMM'    # 学習データ終了年月
  test_start: 'YYYYMM'   # テストデータ開始年月

# =========================================================
# フォント設定（matplotlibグラフ用）
# =========================================================
font:
  title_size: 25
  label_size: 16
  axis_size: 12
  legend_size: 10
  text_size: 14

# =========================================================
# その他
# =========================================================
random_seed: 42
